<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新一代小米SU7发布会</title>
    <style>
        * {{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }}
        
        body {{
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }}
        
        .header {{
            padding: 20px 40px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 20px;
        }}
        
        .logo {{
            width: 50px;
            height: 50px;
            background: #FF6900;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }}
        
        .title {{
            font-size: 24px;
            font-weight: 600;
        }}
        
        .controls {{
            padding: 20px 40px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }}
        
        .btn {{
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }}
        
        .btn:hover {{
            background: #FF6900;
        }}
        
        .btn.active {{
            background: #FF6900;
        }}
        
        .gallery {{
            padding: 20px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }}
        
        .slide-card {{
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s;
        }}
        
        .slide-card:hover {{
            transform: translateY(-5px);
        }}
        
        .slide-card img {{
            width: 100%;
            height: auto;
            display: block;
        }}
        
        .slide-label {{
            padding: 10px 15px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }}
        
        .present-mode {{
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
        }}
        
        .present-mode.active {{
            display: flex;
            align-items: center;
            justify-content: center;
        }}
        
        .present-slide {{
            max-width: 90vw;
            max-height: 90vh;
        }}
        
        .present-slide img {{
            width: 100%;
            height: 100%;
            object-fit: contain;
        }}
        
        .nav-btn {{
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 30px;
            padding: 20px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }}
        
        .present-mode:hover .nav-btn {{
            opacity: 1;
        }}
        
        .nav-btn:hover {{
            background: rgba(255,255,255,0.2);
        }}
        
        .nav-prev {{ left: 20px; }}
        .nav-next {{ right: 20px; }}
        
        .close-btn {{
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 24px;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 8px;
        }}
        
        .scroll-view {{
            display: none;
            padding: 40px;
            max-width: 1280px;
            margin: 0 auto;
        }}
        
        .scroll-view.active {{
            display: block;
        }}
        
        .scroll-slide {{
            margin-bottom: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
        }}
        
        .scroll-slide img {{
            width: 100%;
            height: auto;
            display: block;
        }}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">新一</div>
        <div class="title">新一代小米SU7发布会</div>
    </div>
    
    <div class="controls">
        <button class="btn active" onclick="showGallery()">📷 Gallery</button>
        <button class="btn" onclick="showScroll()">📜 Scroll</button>
        <button class="btn" onclick="startPresent()">▶️ Present</button>
    </div>
    
    <div class="gallery" id="gallery">
        
        <div class="slide-card">
            <img src="slides/slide-01.svg" alt="新一代小米SU7">
            <div class="slide-label">新一代小米SU7</div>
        </div>
        
        <div class="slide-card">
            <img src="slides/slide-02.svg" alt="小米汽车：重新定义智能出行">
            <div class="slide-label">小米汽车：重新定义智能出行</div>
        </div>
        
        <div class="slide-card">
            <img src="slides/slide-03.svg" alt="设计美学：为梦想而生">
            <div class="slide-label">设计美学：为梦想而生</div>
        </div>
        
        <div class="slide-card">
            <img src="slides/slide-04.svg" alt="性能猛兽：2.78秒破百">
            <div class="slide-label">性能猛兽：2.78秒破百</div>
        </div>
        
        <div class="slide-card">
            <img src="slides/slide-05.svg" alt="三电系统：续航与效率的完美平衡">
            <div class="slide-label">三电系统：续航与效率的完美平衡</div>
        </div>
        
        <div class="slide-card">
            <img src="slides/slide-06.svg" alt="智能座舱：澎湃OS开启新纪元">
            <div class="slide-label">智能座舱：澎湃OS开启新纪元</div>
        </div>
        
        <div class="slide-card">
            <img src="slides/slide-07.svg" alt="智能驾驶：全场景智驾体验">
            <div class="slide-label">智能驾驶：全场景智驾体验</div>
        </div>
        
        <div class="slide-card">
            <img src="slides/slide-08.svg" alt="安全体系：全方位守护">
            <div class="slide-label">安全体系：全方位守护</div>
        </div>
        
        <div class="slide-card">
            <img src="slides/slide-09.svg" alt="竞品对比：实力碾压">
            <div class="slide-label">竞品对比：实力碾压</div>
        </div>
        
        <div class="slide-card">
            <img src="slides/slide-10.svg" alt="用户口碑：真实车主评价">
            <div class="slide-label">用户口碑：真实车主评价</div>
        </div>
        
        <div class="slide-card">
            <img src="slides/slide-11.svg" alt="价格与权益">
            <div class="slide-label">价格与权益</div>
        </div>
        
        <div class="slide-card">
            <img src="slides/slide-12.svg" alt="人车家全生态，未来已来">
            <div class="slide-label">人车家全生态，未来已来</div>
        </div>
        
    </div>
    
    <div class="scroll-view" id="scrollView">
        
        <div class="scroll-slide">
            <img src="slides/slide-01.svg" alt="新一代小米SU7">
        </div>
        
        <div class="scroll-slide">
            <img src="slides/slide-02.svg" alt="小米汽车：重新定义智能出行">
        </div>
        
        <div class="scroll-slide">
            <img src="slides/slide-03.svg" alt="设计美学：为梦想而生">
        </div>
        
        <div class="scroll-slide">
            <img src="slides/slide-04.svg" alt="性能猛兽：2.78秒破百">
        </div>
        
        <div class="scroll-slide">
            <img src="slides/slide-05.svg" alt="三电系统：续航与效率的完美平衡">
        </div>
        
        <div class="scroll-slide">
            <img src="slides/slide-06.svg" alt="智能座舱：澎湃OS开启新纪元">
        </div>
        
        <div class="scroll-slide">
            <img src="slides/slide-07.svg" alt="智能驾驶：全场景智驾体验">
        </div>
        
        <div class="scroll-slide">
            <img src="slides/slide-08.svg" alt="安全体系：全方位守护">
        </div>
        
        <div class="scroll-slide">
            <img src="slides/slide-09.svg" alt="竞品对比：实力碾压">
        </div>
        
        <div class="scroll-slide">
            <img src="slides/slide-10.svg" alt="用户口碑：真实车主评价">
        </div>
        
        <div class="scroll-slide">
            <img src="slides/slide-11.svg" alt="价格与权益">
        </div>
        
        <div class="scroll-slide">
            <img src="slides/slide-12.svg" alt="人车家全生态，未来已来">
        </div>
        
    </div>
    
    <div class="present-mode" id="presentMode">
        <button class="close-btn" onclick="stopPresent()">✕</button>
        <button class="nav-btn nav-prev" onclick="prevSlide()">‹</button>
        <div class="present-slide" id="presentSlide"></div>
        <button class="nav-btn nav-next" onclick="nextSlide()">›</button>
    </div>
    
    <script>
        const slides = [{"file": "slide-01.svg", "label": "新一代小米SU7"}, {"file": "slide-02.svg", "label": "小米汽车：重新定义智能出行"}, {"file": "slide-03.svg", "label": "设计美学：为梦想而生"}, {"file": "slide-04.svg", "label": "性能猛兽：2.78秒破百"}, {"file": "slide-05.svg", "label": "三电系统：续航与效率的完美平衡"}, {"file": "slide-06.svg", "label": "智能座舱：澎湃OS开启新纪元"}, {"file": "slide-07.svg", "label": "智能驾驶：全场景智驾体验"}, {"file": "slide-08.svg", "label": "安全体系：全方位守护"}, {"file": "slide-09.svg", "label": "竞品对比：实力碾压"}, {"file": "slide-10.svg", "label": "用户口碑：真实车主评价"}, {"file": "slide-11.svg", "label": "价格与权益"}, {"file": "slide-12.svg", "label": "人车家全生态，未来已来"}];
        let currentSlide = 0;
        
        function showGallery() {{
            document.getElementById('gallery').style.display = 'grid';
            document.getElementById('scrollView').classList.remove('active');
            document.querySelectorAll('.controls .btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }}
        
        function showScroll() {{
            document.getElementById('gallery').style.display = 'none';
            document.getElementById('scrollView').classList.add('active');
            document.querySelectorAll('.controls .btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }}
        
        function startPresent() {{
            currentSlide = 0;
            updatePresentSlide();
            document.getElementById('presentMode').classList.add('active');
        }}
        
        function stopPresent() {{
            document.getElementById('presentMode').classList.remove('active');
        }}
        
        function updatePresentSlide() {{
            const slide = slides[currentSlide];
            document.getElementById('presentSlide').innerHTML = 
                `<img src="${{slide.file}}" alt="${{slide.label}}">`;
        }}
        
        function nextSlide() {{
            currentSlide = (currentSlide + 1) % slides.length;
            updatePresentSlide();
        }}
        
        function prevSlide() {{
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            updatePresentSlide();
        }}
        
        document.addEventListener('keydown', (e) => {{
            if (!document.getElementById('presentMode').classList.contains('active')) return;
            if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'Escape') stopPresent();
        }});
    </script>
</body>
</html>
