<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#0f172a"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.2"/>
    </linearGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1280" height="720" fill="url(#g1)" opacity="0.5"/>
  <circle cx="640" cy="360" r="300" fill="url(#g2)"/>
  
  <!-- 主标题 -->
  <text x="640" y="200" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="52" fill="#f1f5f9" text-anchor="middle" font-weight="bold">把握AI浪潮</text>
  <text x="640" y="270" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="52" fill="#22d3ee" text-anchor="middle" font-weight="bold">共创智能未来</text>
  
  <!-- 装饰线 -->
  <rect x="540" y="300" width="200" height="4" rx="2" fill="#22d3ee"/>
  
  <!-- 核心观点 -->
  <rect x="180" y="350" width="920" height="200" rx="16" fill="#1e293b" stroke="#6366f1" stroke-width="2" opacity="0.9"/>
  
  <text x="220" y="410" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" fill="#f1f5f9">💡 AI不是替代人类，而是增强人类能力</text>
  
  <text x="220" y="460" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" fill="#f1f5f9">🚀 技术变革中，适应力比预测力更重要</text>
  
  <text x="220" y="510" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" fill="#f1f5f9">⭐ 现在开始行动，比等待完美时机更有意义</text>
  
  <!-- 底部信息 -->
  <text x="640" y="600" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#818cf8" text-anchor="middle">人工智能发展趋势 2025-2026</text>
  <text x="640" y="630" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#6366f1" text-anchor="middle">感谢您的关注</text>
  
  <!-- 页码 -->
  <text x="1200" y="680" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#818cf8" text-anchor="end">13 / 13</text>
  
  <!-- 角落装饰 -->
  <circle cx="100" cy="100" r="30" fill="#22d3ee" opacity="0.1"/>
  <circle cx="1180" cy="620" r="40" fill="#6366f1" opacity="0.1"/>
  <circle cx="150" cy="600" r="20" fill="#a78bfa" opacity="0.1"/>
  <circle cx="1130" cy="150" r="25" fill="#22d3ee" opacity="0.1"/>
</svg>