<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <!-- 装饰性背景元素 -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  
  <rect x="0" y="0" width="1280" height="400" fill="url(#gradient1)" opacity="0.5"/>
  
  <!-- 页面标题 -->
  <text x="80" y="70" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#22d3ee" font-weight="600">01 行业概览</text>
  <text x="80" y="110" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="38" fill="#f1f5f9" font-weight="bold">全球AI市场：万亿级赛道加速成型</text>
  <rect x="80" y="125" width="60" height="4" rx="2" fill="#22d3ee"/>
  
  <!-- 左侧大卡片 - 全球市场规模 -->
  <rect x="80" y="160" width="400" height="280" rx="16" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="110" y="200" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#22d3ee" font-weight="600">全球AI市场规模</text>
  
  <!-- 2025年数据 -->
  <text x="110" y="260" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="56" fill="#f1f5f9" font-weight="bold">$5000亿</text>
  <text x="110" y="290" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#818cf8">2025年预计规模</text>
  
  <!-- 增长箭头 -->
  <path d="M 110 320 L 350 320" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  <polygon points="350,320 340,315 340,325" fill="#22d3ee"/>
  <text x="230" y="345" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle">年复合增长率 25%+</text>
  
  <!-- 2030年预测 -->
  <text x="110" y="390" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="36" fill="#6366f1" font-weight="bold">$1.5万亿</text>
  <text x="280" y="390" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#818cf8">2030年预测</text>
  
  <!-- 中间卡片 - 中国市场 -->
  <rect x="510" y="160" width="320" height="280" rx="16" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="540" y="200" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#6366f1" font-weight="600">中国市场规模</text>
  
  <text x="540" y="260" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="48" fill="#f1f5f9" font-weight="bold">6000亿</text>
  <text x="540" y="290" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#818cf8">核心产业规模（元）2025年</text>
  
  <rect x="540" y="310" width="260" height="2" fill="#6366f1" opacity="0.3"/>
  
  <text x="540" y="350" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="32" fill="#22d3ee" font-weight="bold">2万亿+</text>
  <text x="540" y="375" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#818cf8">带动相关产业规模</text>
  
  <text x="540" y="410" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#6366f1">全球占比持续提升</text>
  
  <!-- 右侧卡片 - 投资热度 -->
  <rect x="860" y="160" width="340" height="280" rx="16" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="890" y="200" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#a78bfa" font-weight="600">资本投入热度</text>
  
  <text x="890" y="260" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="44" fill="#f1f5f9" font-weight="bold">$1000亿+</text>
  <text x="890" y="290" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#818cf8">2024年全球AI投资额</text>
  
  <rect x="890" y="310" width="280" height="2" fill="#a78bfa" opacity="0.3"/>
  
  <!-- 投资细分 -->
  <g transform="translate(890, 330)">
    <rect x="0" y="0" width="12" height="12" rx="3" fill="#22d3ee"/>
    <text x="22" y="11" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#f1f5f9">基础模型 35%</text>
  </g>
  
  <g transform="translate(890, 355)">
    <rect x="0" y="0" width="12" height="12" rx="3" fill="#6366f1"/>
    <text x="22" y="11" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#f1f5f9">AI应用 40%</text>
  </g>
  
  <g transform="translate(890, 380)">
    <rect x="0" y="0" width="12" height="12" rx="3" fill="#a78bfa"/>
    <text x="22" y="11" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#f1f5f9">算力基建 25%</text>
  </g>
  
  <!-- 底部横向卡片 - 关键趋势 -->
  <rect x="80" y="470" width="280" height="110" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
  <text x="100" y="505" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#22d3ee" font-weight="600">独角兽企业</text>
  <text x="100" y="545" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="32" fill="#f1f5f9" font-weight="bold">300+</text>
  <text x="100" y="570" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#818cf8">全球AI独角兽</text>
  
  <rect x="390" y="470" width="280" height="110" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
  <text x="410" y="505" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#6366f1" font-weight="600">中国占比</text>
  <text x="410" y="545" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="32" fill="#f1f5f9" font-weight="bold">~30%</text>
  <text x="410" y="570" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#818cf8">全球AI独角兽数量</text>
  
  <rect x="700" y="470" width="280" height="110" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="720" y="505" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#a78bfa" font-weight="600">应用渗透</text>
  <text x="720" y="545" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="32" fill="#f1f5f9" font-weight="bold">60%+</text>
  <text x="720" y="570" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#818cf8">企业已试点AI应用</text>
  
  <rect x="1010" y="470" width="190" height="110" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
  <text x="1030" y="505" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#22d3ee" font-weight="600">用户规模</text>
  <text x="1030" y="545" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" fill="#f1f5f9" font-weight="bold">10亿+</text>
  <text x="1030" y="570" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#818cf8">AI助手日活</text>
  
  <!-- 底部要点 -->
  <rect x="80" y="600" width="1120" height="80" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="1" opacity="0.6"/>
  <text x="100" y="635" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#818cf8">核心要点：</text>
  <text x="100" y="660" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#f1f5f9">• 全球AI市场进入高速增长期，2025-2030年复合增速超25%  • 中国市场增速领先全球，本土企业竞争力持续提升  • 资本持续加注，AI应用层投资占比最高</text>
  
  <!-- 页码 -->
  <text x="1200" y="680" font-family="Geist Sans, Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#818cf8" text-anchor="end">03 / 13</text>
</svg>