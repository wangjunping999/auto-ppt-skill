name: Editorial Infographic
mood: Data-driven, clean, authoritative. Magazine-quality data storytelling.

color_scheme:
  primary: "#1b2838"      # Dark navy
  secondary: "#4a6fa5"    # Steel blue
  accent: "#e74c3c"       # Signal red
  background: "#f8f9fa"   # Near-white
  text: "#1b2838"         # Dark navy
  card_bg: "#ffffff"      # White
  chart_colors:
    - "#e74c3c"            # Signal red (accent)
    - "#3498db"            # Blue
    - "#2ecc71"            # Green
    - "#f39c12"            # Yellow
    - "#9b59b6"            # Purple
    - "#1abc9c"            # Turquoise
    - "#e67e22"            # Orange
    - "#34495e"            # Dark gray

typography:
  heading_font: "DM Serif Display, Georgia, 'PingFang SC', 'Microsoft YaHei', serif"
  body_font: "Source Sans 3, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif"
  cjk_font: "'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif"
  scale: 1.0

card_style:
  border_radius: 6
  shadow: "0 1px 4px rgba(0,0,0,0.08)"
  border: "1px solid #e9ecef"
  gap: 20

gradients:
  hero_bg: "linear-gradient(180deg, #1b2838 0%, #2c3e50 100%)"
  card_highlight: "linear-gradient(180deg, #ffffff 0%, #f8f9fa 100%)"

elevation:
  shadow_sm: "0 1px 2px rgba(0,0,0,0.04)"
  shadow_md: "0 2px 8px rgba(0,0,0,0.08)"
  shadow_lg: "0 8px 24px rgba(0,0,0,0.12)"

decoration:
  pattern: "none"
  pattern_opacity: 0
  icon_style: "outline"
  icon_weight: 1.5

slide_type_overrides:
  cover:
    card_bg: "#1b2838"
    text: "#ffffff"
    heading_scale: 1.3
  quote:
    card_bg: "#1b2838"
    text: "#ffffff"
    body_font_style: "italic"
  data:
    heading_scale: 0.9
  section_divider:
    background: "#1b2838"
    text: "#ffffff"
