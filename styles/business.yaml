name: Business Professional
mood: Clean, authoritative, trustworthy. Conveys competence and reliability.

color_scheme:
  primary: "#1a365d"      # Deep navy blue
  secondary: "#2d5f8a"    # Medium blue
  accent: "#e67e22"       # Warm orange for emphasis
  background: "#ffffff"   # Clean white
  text: "#1a202c"         # Near-black
  card_bg: "#f0f4f8"      # Light gray-blue
  chart_colors:            # Multi-series data viz; [0]=accent
    - "#e67e22"            # Warm orange (accent)
    - "#2d5f8a"            # Medium blue
    - "#27ae60"            # Green
    - "#8e44ad"            # Purple
    - "#c0392b"            # Red
    - "#16a085"            # Teal
    - "#f39c12"            # Gold
    - "#2980b9"            # Bright blue

typography:
  heading_font: "DM Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
  body_font: "Inter, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif"
  cjk_font: "'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif"
  scale: 1.0

card_style:
  border_radius: 12
  shadow: "0 2px 8px rgba(0,0,0,0.08)"
  border: "1px solid #e2e8f0"
  gap: 24

gradients:
  hero_bg: "linear-gradient(135deg, #1a365d 0%, #2a4a7f 100%)"
  card_highlight: "linear-gradient(180deg, #f0f4f8 0%, #ffffff 100%)"

elevation:
  shadow_sm: "0 1px 2px rgba(0,0,0,0.05)"
  shadow_md: "0 4px 12px rgba(0,0,0,0.08)"
  shadow_lg: "0 12px 40px rgba(0,0,0,0.15)"

decoration:
  pattern: "none"
  pattern_opacity: 0
  icon_style: "outline"
  icon_weight: 1.5

slide_type_overrides:
  cover:
    card_bg: "#1a365d"
    text: "#ffffff"
    heading_scale: 1.3
  quote:
    card_bg: "#1a365d"
    text: "#ffffff"
    body_font_style: "italic"
  data:
    heading_scale: 0.9
  section_divider:
    background: "#1a365d"
    text: "#ffffff"
